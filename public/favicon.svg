<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#091a46"/>
  <!-- Q outer ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#22d3ee" stroke-width="3"/>
  <!-- Break in ring to suggest quantum / interference -->
  <path d="M21 12 A8 8 0 0 1 23 16" stroke="#091a46" stroke-width="3" fill="none"/>
  <!-- Q tail -->
  <line x1="20" y1="20" x2="23" y2="23"
      stroke="#fde68a"
      stroke-width="2.4"
       />
  <!-- Qubit dot -->
  <circle cx="16" cy="16" r="2" fill="#fde68a"/>
</svg>
